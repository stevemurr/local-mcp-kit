name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-minimum-toolchain:
    name: Build (Swift 6.0 floor)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select minimum Swift toolchain
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Show Swift version
        run: swift --version

      - name: Describe package
        run: swift package describe

      - name: Build
        run: swift build

      - name: Build (release)
        run: swift build -c release

  test:
    name: Test (default toolchain)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build --build-tests

      # Each target runs serially in its own bounded step: the raw-socket
      # suites block cooperative-pool threads while their peers answer, and
      # the hosted runners have wedged whole unbounded invocations. A wedged
      # target times out without hiding the results of the others.
      - name: Test LocalMCPContractsTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPContractsTests

      - name: Test LocalMCPDiscoveryTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPDiscoveryTests

      - name: Test LocalMCPDiscoveryBonjourTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPDiscoveryBonjourTests

      - name: Test LocalMCPProducerTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPProducerTests

      - name: Test LocalMCPConsumerTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPConsumerTests

      - name: Test LocalMCPIntegrationTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPIntegrationTests

      - name: Test LocalMCPTwoProducerExampleTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPTwoProducerExampleTests

      - name: Test LocalMCPCommandTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPCommandTests

      - name: Test LocalMCPSeparateProcessTests
        if: ${{ !cancelled() }}
        run: Scripts/ci-test-target.sh LocalMCPSeparateProcessTests
